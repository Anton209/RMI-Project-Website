<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rabaul Metal Industries – Services</title>

  <style>
    :root {
      --primary-color: #253A50;
      --secondary-color: #ffffff;
      --accent-color: #ffcc00;
      --background-color: #f5f5f5;
      --text-color: #333;
    }

    * {margin:0; padding:0; box-sizing:border-box;}

    body {
      font-family: 'Century Gothic', sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
      line-height: 1.6;
    }

    .container {width:90%; max-width:1200px; margin:auto;}

    /* HEADER */
    .site-header {
      background-color: var(--primary-color);
      color: var(--secondary-color);
      padding: 20px 0;
      position: relative;
      z-index: 10;
    }

    .logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .logo img {height:60px;}
    .logo p {font-size:30px; margin:0;}

    nav ul {
      display: flex;
      justify-content: center;
      gap: 30px;
      list-style: none;
      margin-top: 15px;
    }

    nav a {
      color: var(--secondary-color);
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background 0.3s;
      font-size: large;
    }

    nav a:hover {background-color: rgba(255,255,255,0.1);}

    /* MAIN LAYOUT */
    .info-container {
      display:flex;
      gap:40px;
      max-width:1100px;
      margin:40px auto;
    }

    /* SLIDESHOW */
    .slideshow {
      position:relative;
      width:400px;
    }

    .slideshow img {
      width:100%;
      border-radius:8px;
      cursor:pointer;
      filter: grayscale(40%) brightness(70%);
      transition: transform 0.5s ease, filter 0.5s ease, opacity 0.6s ease;
      transform: scale(1);
      opacity: 0;
    }

    /* Fade-in class */
    .slideshow img.fade-in {
      opacity: 1;
    }

    /* Hover zoom + brighten */
    .slideshow:hover img {
      filter: grayscale(0%) brightness(100%);
      transform: scale(1.05);
    }

    /* CLEAN TEXT OVERLAY (no bubble) */
    .slide-title {
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      color:white;
      font-size:22px;
      font-weight:bold;
      z-index:30;
      pointer-events:none;
      text-align:center;

      /* bubble removed */
      background:none;
      padding:0;
      border-radius:0;
    }

    /* ARROWS */
    .arrow {
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      font-size:30px;
      background:rgba(0,0,0,0.5);
      color:#fff;
      padding:5px 10px;
      cursor:pointer;
      border-radius:4px;
      display:none;
      z-index:20;
    }

    .arrow.left {left:10px;}
    .arrow.right {right:10px;}

    /* DROPDOWN */
    .dropdown-list {
      display:none;
      flex-wrap:wrap;
      gap:10px;
      margin-top:15px;
    }

    .bubble {
      background:#eee;
      padding:10px 15px;
      border-radius:20px;
      cursor:pointer;
      transition:0.2s;
    }

    .bubble:hover {background:#ddd;}

    /* DETAILS PANEL */
    .details-panel {
      flex:1;
      background:#fff;
      padding:20px;
      border-radius:8px;
      box-shadow:0 4px 10px rgba(0,0,0,0.1);
    }

    .details-panel img {
      max-width:400px;
      width:100%;
      border-radius:8px;
      margin-bottom:15px;
    }

    /* FOOTER */
    .site-footer {
      background-color: var(--primary-color);
      color: var(--secondary-color);
      padding: 30px 0;
      text-align: center;
      margin-top: 40px;
    }

    .site-footer .footer-links {
      list-style: none;
      display: flex;
      justify-content: center;
      gap: 25px;
      margin-bottom: 15px;
      padding: 0;
    }

    .site-footer .footer-links a {
      color: var(--secondary-color);
      text-decoration: none;
      transition: color 0.3s;
    }

    .site-footer .footer-links a:hover {
      color: var(--accent-color);
    }

    .cta-button {
      display:inline-block;
      margin-top:20px;
      padding:12px 24px;
      background-color: var(--accent-color);
      color: var(--primary-color);
      font-weight:bold;
      text-decoration:none;
      border-radius:6px;
      transition: background 0.3s;
    }

    .cta-button:hover {background-color:#e6b800;}
  </style>
</head>

<body>

<header class="site-header">
  <div class="container header-flex">
    <div class="logo">
      <a href="index.html"><img src="Projects/images/RMI Logo/RMI Logo.png" alt="RMI Logo"></a>
      <p>RABAUL METAL INDUSTRIES</p>
    </div>
    <nav>
      <ul>
        <li><a href="about.html">Our Company</a></li>
        <li><a href="services.html">Our Services</a></li>
        <li><a href="contact.html">Make an Enquiry</a></li>
      </ul>
    </nav>
  </div>
</header>

<div class="info-container">

  <!-- LEFT SIDE SLIDESHOW -->
  <div class="slideshow" id="slideshow">
    <img id="slideImage" src="projects/images/rollformed.jpg" alt="Service Image">
    <div class="slide-title" id="slideTitle">Roll Formed Steel</div>

    <div class="arrow left" id="prev">&#10094;</div>
    <div class="arrow right" id="next">&#10095;</div>

    <div class="dropdown-list" id="dropdownList"></div>
  </div>

  <!-- RIGHT SIDE DETAILS -->
  <div class="details-panel">
    <img id="detailImage" src="" alt="">
    <p id="detailText">Click a product bubble to see details.</p>
  </div>

</div>

<footer class="site-footer">
  <div class="container">

   <h2>Need Quality Steelwork?</h2>
    <p>Contact RMI today for a free consultation.</p>
    <a href="contact.html" class="cta-button">Get in Touch</a>
  </div>
</footer>

<script>
  const services = [
    {
      name:"Roll Formed Steel",
      img:"Projects/images/products/Gray image of Rollformer.jpg",
      products:[
        {name:"Roofing Iron", img:"projects/images/roofing.jpg", desc:"Durable roofing iron for all projects."},
        {name:"Cladding", img:"projects/images/cladding.jpg", desc:"Protective cladding solutions."},
        {name:"Gutters", img:"projects/images/gutters.jpg", desc:"Reliable gutter systems."},
        {name:"Flashing", img:"projects/images/flashing.jpg", desc:"Weatherproof flashing products."}
      ]
    },

    {
      name:"Structural Steel",
      img:"projects/images/Executive Apartments/executive-2.png",
      products:[
        {name:"Stairs", img:"projects/images/stairs.jpg", desc:"Custom steel stairs."},
        {name:"Beams", img:"projects/images/beams.jpg", desc:"Strong beams for construction."}
      ]
    },

    {
      name:"Fabricated Steel",
      img:"projects/images/products/Steel Fabrication - Steel Trusses.jpg",
      products:[
        {name:"Bread Ovens", img:"projects/images/oven.jpg", desc:"Industrial bread ovens."},
        {name:"Galvanised Tanks", img:"projects/images/tank.jpg", desc:"Rainwater tanks."},
        {name:"Kiln Pipes", img:"projects/images/kiln.jpg", desc:"High-temp kiln pipes."},
        {name:"Flue Pipes", img:"projects/images/flue.jpg", desc:"Durable flue pipes."},
        {name:"Stub Ends", img:"projects/images/stub.jpg", desc:"Stub ends for piping."},
        {name:"Hold Downs", img:"projects/images/hold.jpg", desc:"Steel hold downs."}
      ]
    },

    {
      name:"Merchant Steel",
      img:"projects/images/products/Merchant Steel - RHS.jpg",
      products:[
        {name:"Hollow Section", img:"projects/images/hollow.jpg", desc:"Various hollow sections."},
        {name:"Flat Bar", img:"projects/images/flatbar.jpg", desc:"Flat bar steel."},
        {name:"Flat Plates", img:"projects/images/plates.jpg", desc:"Flat plates for fabrication."},
        {name:"Reo-bar", img:"projects/images/reobar.jpg", desc:"Reo-bar and mesh."},
        {name:"Various Items", img:"projects/images/misc.jpg", desc:"Welding rods, nails, etc."}
      ]
    },

    {
      name:"Labor Hire",
      img:"projects/images/Hire Boys - Kimbe.jpg",
      products:[
        {name:"Labor Hire", img:"projects/images/laborhire.jpg", desc:"Low-level construction projects."},
        {name:"Machinery Hire", img:"projects/images/machinery.jpg", desc:"Telehandler, tipper truck, etc."},
        {name:"Steel Fabrication", img:"projects/images/fabrication.jpg", desc:"Custom steel fabrication."},
        {name:"Construction", img:"projects/images/construction.jpg", desc:"Full project design + labor."},
        {name:"Genset Servicing", img:"projects/images/genset.jpg", desc:"Installing and servicing gensets for your business."}
      ]
    },

    {
      name:"Specialist Hire",
      img:"projects/images/specialist.jpg",
      products:[
        {name:"Design", img:"projects/images/design.jpg", desc:"Drafting, documentation, steel detailing, shop drawings, concept design."},
        {name:"Specialist Service", img:"projects/images/specialist1.jpg", desc:"Expert specialist hire."}
      ]
    }
  ];

  let currentIndex = 0;
  const slideImage = document.getElementById("slideImage");
  const slideTitle = document.getElementById("slideTitle");
  const dropdownList = document.getElementById("dropdownList");
  const detailImage = document.getElementById("detailImage");
  const detailText = document.getElementById("detailText");
  const prev = document.getElementById("prev");
  const next = document.getElementById("next");
  const slideshow = document.getElementById("slideshow");

  let slideInterval = setInterval(nextSlide, 4000);

  function showService(index){
    const service = services[index];

    slideImage.classList.remove("fade-in");
    slideImage.src = service.img;

    slideImage.onload = () => {
      slideImage.classList.add("fade-in");
    };

    slideTitle.textContent = service.name;

    dropdownList.innerHTML = "";

    service.products.forEach(p=>{
      const bubble = document.createElement("div");
      bubble.className="bubble";
      bubble.textContent=p.name;
      bubble.onclick=()=>{
        detailImage.src=p.img;
        detailText.textContent=p.desc;
      };
      dropdownList.appendChild(bubble);
    });
  }

  function nextSlide(){
    currentIndex = (currentIndex+1)%services.length;
    showService(currentIndex);
  }

  function prevSlide(){
    currentIndex = (currentIndex-1+services.length)%services.length;
    showService(currentIndex);
  }

  slideshow.addEventListener("mouseenter", () => {
    clearInterval(slideInterval);
    prev.style.display = "block";
    next.style.display = "block";
  });

  slideshow.addEventListener("mouseleave", () => {
    slideInterval = setInterval(nextSlide, 4000);
    prev.style.display = "none";
    next.style.display = "none";
  });

  slideImage.addEventListener("click", ()=>{
    dropdownList.style.display =
      dropdownList.style.display==="flex" ? "none" : "flex";
  });

  prev.addEventListener("click", prevSlide);
  next.addEventListener("click", nextSlide);

  showService(currentIndex);
  slideImage.classList.add("fade-in");
</script>

</body>
</html>
