<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rabaul Metal Industries</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600&family=Open+Sans&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary-color: #253A50;
      --secondary-color: #ffffff;
      --accent-color: #ffcc00;
      --background-color: #f5f5f5;
      --text-color: #333;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Century Gothic', sans-serif;
      background-color: var(--background-color);
      color: var(--text-color);
      line-height: 1.6;
      height: 100%; 
      margin: 0; 
      display: flex; 
      flex-direction: column;
    }

    main { 
    flex: 1; 
    }

    .container {
      width: 90%;
      max-width: 1200px;
      margin: auto;
    }

    /* HEADER & NAV */
    /* HEADER & NAV */
header { 
background-color: var(--primary-color);
color: var(--secondary-color);
padding: 15px 0;
position: sticky; 
top: 0; 
z-index: 1000; 
text-align: center;
}

.logo { 
  display: flex; flex-direction: column;
  align-items:center;
  gap: 10px; } 
  
.logo p { 
font-size: 30px; 
margin: 0; 
} 

.logo img { 
height: 60px; 
}

/* --- Center the navigation links --- */
nav ul { display: flex; justify-content: center;
gap: 30px; list-style: none;
margin: 15px 0 0 0; padding: 0; 
}

nav a { color: var(--secondary-color);
text-decoration: none;
font-weight: normal;
padding: 5px 10px;
border-radius: 4px;
transition: background 0.3s;
font-size: large; 
}

nav a:hover { 
background-color: rgba(255, 255, 255, 0.1); 
}


    /* HERO SECTION */
    /* HERO SECTION */
/* HERO Section */
#hero {
  position: relative;
  background: url("../projects/images/natalie-with-mixer.png") center center no-repeat;
  background-size: cover;      
  min-height: 500px;           
  display: flex;
  align-items: center;         
  justify-content: center;    
  text-align: center;
  color: rgb(255, 255, 255);
}

/* Optional overlay for readability */
#hero::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); /* dark overlay */
  z-index: 0;
}

.hero-text {
  position: relative;
  z-index: 1;                  /* ensures text is above overlay */
  max-width: 800px;
  padding: 20px;
}

#hero h2 {
  font-family: 'Century Gothic', sans-serif;
  font-size: 2em;
  font-weight: normal;
  margin-bottom: 15px;
  color:white
}

#hero p {
  font-family: 'Century Gothic', sans-serif;
  font-size: 1.2em;
  margin: 15px auto 0;
}


/* Responsive adjustments */
@media (min-width: 768px) {
  #hero {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hero-image {
    height: 400px; /* Keep the same or adjust as needed */
  }
  .hero-text {
    padding: 50px 20px;
  }
}

    section {
      padding: 60px 0;
    }
    section h2 {
      color: var(--primary-color);
      margin-bottom: 20px;
      text-align: center;
      font-family: 'Montserrat', sans-serif;
    }


    /* CONTACT FORM */
    /* CONTACT FORM */
#contact h2{
text-align: center;
}

    form {
      max-width: 600px;
      margin: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    form label {
      font-weight: bold;
    }
    form input,
    form textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    form input:focus,
    form textarea:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 5px rgba(31, 47, 69, 0.3);
    }
    form button {
      background-color: var(--primary-color);
      color: var(--secondary-color);
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
    form button:hover {
      background-color: #152232;
    }

    /* FOOTER */
    footer {
      background-color: var(--primary-color);
      color: var(--secondary-color);
      text-align: center;
      padding: 20px 0;
      margin-top: 40px;
      bottom: 0; 
      width: 100%;
    }

  </style>
  <header>
    <div class="container header-flex">
      <div class="logo">
  <a href="index.html">
    <img src="Projects/images/RMI Logo/RMI Logo.png" alt="RMI Logo">
  </a>
  <p>RABAUL METAL INDUSTRIES</p>
      <nav>
        <ul>
          <li><a href="about.html">Our Company</a></li>
          <li><a href="services.html">Our Services</a></li>
          <li><a href="contact.html">Make an Enquiry</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <!-- HERO -->
<section id="hero">
  <div class="hero-text">
    <h2>Roofing Iron, Construction, Steel Fabrication.</h2>

    <p>
      Have a question? Contact us in the section below.
    </p>


  <br />
    <br />

  <!-- CONTACT -->
  <section id="contact">
    <div class="container">
      <h2>Contact Us</h2>
      <form action="https://formsubmit.co/ablyons@rmi.com.pg" method="POST">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="New Contact Form Message from RMI Website">
        <input type="hidden" name="_template" value="box">
        <input type="hidden" name="_next" value="https://anton209.github.io/RMI-Project-Website/thanks.html">

        <label for="name">Name:</label>
        <input type="text" id="name" name="name" placeholder="Your Name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="your@email.com" required />

        <label for="message">Message:</label>
        <textarea id="message" name="message" placeholder="How can we help you?" rows="5" required></textarea>

        <button type="submit">Send Message</button>
      </form>
    </div>
  </section>

    <!-- FOOTER -->
  <footer>
    <div class="container">
      <p>&copy; 2025 Rabaul Metal Industries. All rights reserved.</p>
    </div>
  </footer>
  </body>
</html>
